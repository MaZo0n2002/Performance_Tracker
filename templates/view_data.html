<!DOCTYPE html>
<html>
<head>
<title>Task Database</title>

<style>

body{
font-family:Arial;
padding:40px;
background:#f4f6fb;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:12px;
border:1px solid #ddd;
text-align:left;
}

th{
background:#5D84FF;
color:white;
}

</style>

</head>

<body>

<h2>Employee Task Data</h2>

<table>

<tr>
<th>Date</th>
<th>Time</th>
<th>First Name</th>
<th>Employee ID</th>
<th>Task</th>
<th>Duration</th>
<th>Status</th>
</tr>

{% for row in rows %}

<tr>
<td>{{row[0]}}</td>
<td>{{row[1]}}</td>
<td>{{row[2]}}</td>
<td>{{row[3]}}</td>
<td>{{row[4]}}</td>
<td>{{row[5]}}</td>
<td>{{row[6]}}</td>
</tr>

{% endfor %}

</table>

</body>
</html>
